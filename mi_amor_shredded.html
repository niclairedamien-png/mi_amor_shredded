<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Amor Shredded</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#131313;--s2:#1a1a1a;--s3:#222;
  --b1:#2a2a2a;--b2:#3a3a3a;--b3:#555;
  --tx:#f2f2f2;--tm:#aaa;--tf:#555;
  --green:#39d98a;--gd:#0d2e1c;--gm:#1a4a2e;
  --blue:#4da6ff;--bd:#0a1f3a;
  --purple:#a78bfa;--pd:#1a1040;
  --amber:#f5a623;--ad:#2e1e00;
  --red:#ff5c5c;--teal:#2dd4bf;
  --coral:#ff6b6b;--cd:#2a0a0a;
  --font-d:'Barlow Condensed',sans-serif;
  --font-b:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}
body{padding-bottom:70px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--b1);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--tf);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.nav-btn.active{color:var(--green)}

/* VIEWS */
.view{display:none;padding:16px;position:relative;z-index:1}
.view.active{display:block}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-pad{padding:14px}
.card-title{font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tf);margin-bottom:10px}

/* LOGO HEADER */
.logo-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.logo-left{}
.logo-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.logo-name{font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.logo-name span{color:var(--green)}
.logo-date-big{font-family:var(--font-d);font-size:40px;font-weight:800;line-height:1;letter-spacing:-.01em}
.logo-date-big span{color:var(--green)}
.logo-weekday{font-family:var(--font-d);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--tf);margin-bottom:2px}
.logo-year{font-family:var(--font-d);font-size:14px;font-weight:600;color:var(--tf)}
.logo-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;padding-top:6px}

/* PAGE LOGO (other tabs) */
.page-logo{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.page-logo-name{font-family:var(--font-d);font-size:18px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.page-logo-name span{color:var(--green)}
.page-logo-sub{font-size:11px;color:var(--tf);font-family:var(--font-d);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}

/* BADGE */
.badge{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 10px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.badge-a{background:var(--bd);color:var(--blue)}
.badge-b{background:var(--pd);color:var(--purple)}
.badge-c{background:var(--cd);color:var(--coral)}
.badge-cardio{background:var(--gd);color:var(--green)}
.badge-reload{background:var(--s2);color:var(--tf)}
.badge-sanctuary{background:var(--s2);color:var(--tf)}

/* WEEK STRIP */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
.ws-day{border-radius:8px;padding:8px 3px 7px;text-align:center;border:1px solid var(--b1);background:var(--s1);cursor:pointer;transition:all .15s;position:relative}
.ws-day:active{transform:scale(.95)}
.ws-day.wsd-a{background:var(--bd);border-color:#1e4a7a}
.ws-day.wsd-b{background:var(--pd);border-color:#3a2a7a}
.ws-day.wsd-c{background:var(--cd);border-color:#4a1a1a}
.ws-day.wsd-cardio{background:var(--gd);border-color:var(--gm)}
.ws-day.wsd-reload{opacity:.45}
.ws-day.wsd-sanctuary{opacity:.35}
.ws-day.today{border-color:var(--green) !important}
.ws-day.viewing{box-shadow:0 0 0 2px var(--green);border-color:var(--green) !important}
.ws-name{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--tm)}
.ws-day.wsd-a .ws-name{color:var(--blue)}
.ws-day.wsd-b .ws-name{color:var(--purple)}
.ws-day.wsd-c .ws-name{color:var(--coral)}
.ws-day.wsd-cardio .ws-name{color:var(--green)}
.ws-day.today .ws-name{color:var(--green) !important}
.ws-type{font-size:9px;color:var(--tf);margin-top:2px;font-family:var(--font-d);font-weight:600;letter-spacing:.03em;text-transform:uppercase}

/* VIEWING BANNER */
.viewing-banner{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tm)}
.viewing-banner b{color:var(--green);font-family:var(--font-d);font-weight:700}
.back-btn{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tf);background:none;border:1px solid var(--b1);border-radius:5px;padding:4px 10px;cursor:pointer}

/* TIME BANNER */
.time-banner{background:linear-gradient(135deg,#0d2e1c 0%,#0a1f3a 100%);border:1px solid var(--gm);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.time-val{font-family:var(--font-d);font-size:36px;font-weight:800;color:var(--green);line-height:1}
.time-lbl{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);margin-bottom:4px}
.time-sub{font-size:11px;color:var(--tm);margin-top:3px}
.time-breakdown{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.tb-item{font-size:11px;color:var(--tf);font-family:var(--font-d);font-weight:600}
.tb-item span{color:var(--tm)}

/* NUDGE */
.nudge{border-radius:12px;padding:12px 14px;margin-bottom:12px}
.nudge.urgent{background:#2e1a00;border:1px solid #5a3300}
.nudge.normal{background:var(--gd);border:1px solid var(--gm)}
.nudge.streak{background:var(--pd);border:1px solid #3a2a7a}
.nudge-title{font-family:var(--font-d);font-size:14px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.nudge.urgent .nudge-title{color:var(--amber)}
.nudge.normal .nudge-title{color:var(--green)}
.nudge.streak .nudge-title{color:var(--purple)}
.nudge-sub{font-size:12px;color:var(--tm);line-height:1.4}

/* PROGRESS RING */
.ring-wrap{display:flex;align-items:center;gap:16px;padding:14px}
.ring-info{flex:1}
.ring-pct{font-family:var(--font-d);font-size:40px;font-weight:800;color:var(--green);line-height:1}
.ring-label{font-size:12px;color:var(--tm);margin-top:3px}
.ring-done{font-family:var(--font-d);font-size:13px;font-weight:600;color:var(--tx);margin-top:5px}

/* ZONE HEADER */
.zone-header{display:flex;align-items:center;gap:8px;padding:8px 14px 6px;background:var(--s2);border-bottom:1px solid var(--b1)}
.zone-icon{font-size:13px}
.zone-name{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tf)}

/* PHASE */
.phase-head{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1px solid var(--b1);cursor:pointer;user-select:none}
.phase-pill{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 9px;border-radius:4px;flex-shrink:0}
.pp-warm{background:var(--ad);color:var(--amber)}
.pp-strength{background:var(--bd);color:var(--blue)}
.pp-hyp{background:var(--pd);color:var(--purple)}
.pp-grind{background:var(--cd);color:var(--coral)}
.pp-circuit{background:#2e0a0a;color:var(--red)}
.pp-finish{background:var(--gd);color:var(--green)}
.phase-dur{font-size:11px;color:var(--tf);margin-left:auto}
.phase-chevron{width:16px;height:16px;stroke:var(--tf);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s;flex-shrink:0;margin-left:6px}
.phase-chevron.open{transform:rotate(180deg)}
.phase-body{display:none}
.phase-body.open{display:block}
.phase-instructions{font-size:12px;color:var(--tm);line-height:1.6;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--b1)}
.phase-instructions b{color:var(--tx);font-weight:500}

/* SUPERSET / ROUND CONTAINERS */
.superset-wrap{border-left:2px solid var(--purple);margin:0 14px 8px;border-radius:0 6px 6px 0;overflow:hidden}
.superset-label{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--purple);padding:4px 10px;background:#1a1040}
.round-wrap{margin:8px 14px;border:1px solid var(--b2);border-radius:8px;overflow:hidden}
.round-header{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--red);padding:6px 12px;background:#2e0a0a;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.round-rest{font-size:10px;color:var(--tf);font-family:var(--font-b);font-weight:400;text-transform:none;letter-spacing:0}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s;position:relative}
.ex-row:last-child{border-bottom:none}
.ex-row:active{background:var(--s2)}
.ex-row.done{opacity:.4}
.ex-row.done .ex-name{text-decoration:line-through}
.ex-row.in-superset{padding-left:10px}
.ex-row.in-round{padding-left:10px}
.check{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.check.ticked{background:var(--green);border-color:var(--green)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;color:var(--tx);line-height:1.3}
.ex-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.mp{font-size:11px;padding:2px 7px;border-radius:4px;font-family:var(--font-d);font-weight:600;letter-spacing:.04em;white-space:nowrap}
.mp-sets{background:var(--s3);color:var(--tm)}
.mp-weight{background:var(--gd);color:var(--green)}
.mp-speed{background:var(--bd);color:var(--blue)}
.mp-rest{background:var(--s3);color:var(--tf)}
.mp-pb{background:#1a2e1a;color:var(--green)}
.demo-btn{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--blue);font-family:var(--font-d);font-weight:700;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;margin-top:4px}
.demo-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.swap-btn{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--amber);background:none;border:1px solid #3a2800;border-radius:4px;padding:2px 7px;cursor:pointer;margin-top:4px;margin-left:4px}
.pb-badge{font-family:var(--font-d);font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--green);background:var(--gd);border:1px solid var(--gm);border-radius:4px;padding:2px 7px;animation:pb-pop .4s ease}
@keyframes pb-pop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}

/* SWAP MODAL */
.swap-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.swap-modal{background:var(--s1);border:1px solid var(--b1);border-radius:16px 16px 0 0;padding:20px 16px 32px;width:100%;max-width:480px}
.swap-modal-title{font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.swap-modal-sub{font-size:12px;color:var(--tm);margin-bottom:14px}
.swap-option{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.swap-option:last-child{border-bottom:none}
.swap-option:active{opacity:.7}
.swap-opt-name{font-size:14px;font-weight:500;color:var(--tx);flex:1}
.swap-cancel{width:100%;padding:13px;background:none;border:1px solid var(--b1);border-radius:10px;color:var(--tm);font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-top:12px}

/* COMPLETE BTN */
.complete-btn{width:100%;padding:16px;background:var(--green);color:#000;font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;margin-top:4px;transition:opacity .2s}
.complete-btn:active{opacity:.8}

/* SESSION NOTES */
.notes-wrap{padding:12px 14px;border-top:1px solid var(--b1)}
.notes-label{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tf);margin-bottom:6px}
.notes-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--font-b);font-size:13px;resize:none;min-height:60px}
.notes-input:focus{outline:none;border-color:var(--green)}
.notes-save{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--green);background:none;border:1px solid var(--gm);border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:6px}

/* NOTICES */
.day-notice{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:24px 16px;text-align:center;margin-bottom:12px}
.notice-title{font-family:var(--font-d);font-size:24px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.notice-sub{font-size:13px;color:var(--tm);line-height:1.6;max-width:280px;margin:0 auto}

/* PROGRESS TAB */
.prog-hero{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:12px}
.prog-hero-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.prog-weight-display{font-family:var(--font-d);font-size:48px;font-weight:800;line-height:1;color:var(--tx)}
.prog-weight-display span{color:var(--green)}
.prog-weight-label{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tf);margin-bottom:4px}
.prog-target-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.prog-target-num{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--red)}
.prog-target-lbl{font-size:12px;color:var(--tm)}
.prog-lost-big{font-family:var(--font-d);font-size:22px;font-weight:800;color:var(--green)}

.arc-wrap{position:relative;margin:0 auto 8px;width:100%;max-width:320px}
.arc-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);text-align:center}
.arc-pct{font-family:var(--font-d);font-size:28px;font-weight:800;color:var(--green);line-height:1}
.arc-pct-lbl{font-size:11px;color:var(--tf);font-family:var(--font-d);font-weight:600;letter-spacing:.05em;text-transform:uppercase}

.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.stat-card.hi{border-color:var(--gm);background:var(--gd)}
.stat-label{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);margin-bottom:4px}
.stat-val{font-family:var(--font-d);font-size:32px;font-weight:800;line-height:1;color:var(--tx)}
.stat-card.hi .stat-val{color:var(--green)}
.stat-sub{font-size:11px;color:var(--tf);margin-top:3px}

/* HEATMAP */
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--s2)}
.hm-cell.done-a{background:var(--blue)}
.hm-cell.done-b{background:var(--purple)}
.hm-cell.done-c{background:var(--coral)}
.hm-cell.done-cardio{background:var(--teal)}
.hm-cell.done-rec{background:var(--gm)}
.hm-cell.today-c{border:1.5px solid var(--green)}
.hm-cell.future{opacity:.15}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.hm-lbl{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--tf);text-align:center}

/* PB TABLE */
.pb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.pb-row:last-child{border-bottom:none}
.pb-ex{font-size:13px;color:var(--tx);flex:1}
.pb-val{font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--green)}
.pb-date{font-size:11px;color:var(--tf)}

/* WEIGHT CHART */
.chart-wrap{position:relative;width:100%;height:180px}

/* W INPUT */
.w-input-row{display:flex;gap:8px;margin-bottom:8px}
.w-input-row input{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;color:var(--tx);font-family:var(--font-b);font-size:16px}
.w-input-row input::placeholder{color:var(--tf)}
.w-input-row input:focus{outline:none;border-color:var(--green)}
.w-log-btn{background:var(--green);color:#000;border:none;border-radius:8px;padding:12px 18px;font-family:var(--font-d);font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}

/* HISTORY */
.hist-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--b1)}
.hist-row:last-child{border-bottom:none}
.hist-date{font-size:13px;color:var(--tx)}
.hist-type{font-size:11px;color:var(--tm);margin-top:2px;font-family:var(--font-d);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.hist-notes{font-size:11px;color:var(--tf);margin-top:3px;font-style:italic;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-pct{font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--green)}
.hist-wt{font-size:11px;color:var(--tm);margin-top:2px;text-align:right}

/* SETTINGS */
.settings-label{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tm);margin-bottom:8px;display:block}
.settings-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px;color:var(--tx);font-family:var(--font-b);font-size:15px;margin-bottom:10px}
.settings-input:focus{outline:none;border-color:var(--green)}
.save-btn{width:100%;padding:14px;background:var(--green);color:#000;font-family:var(--font-d);font-size:16px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer}
.reset-btn{width:100%;padding:13px;background:none;border:1px solid #3a1a1a;border-radius:10px;color:var(--red);font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b1)}
.toggle-label{font-size:14px;color:var(--tx);font-weight:500}
.toggle-sub{font-size:12px;color:var(--tm);margin-top:2px}
.toggle{width:44px;height:24px;background:var(--b1);border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

/* NOTIF */
.notif-card{background:var(--pd);border:1px solid #3a2a7a;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.notif-card.granted{background:var(--gd);border-color:var(--gm)}
.notif-btn{background:var(--purple);color:#000;border:none;border-radius:8px;padding:10px 16px;font-family:var(--font-d);font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0}
.notif-card.granted .notif-btn{background:var(--green)}

/* DAY SCHEDULE PICKER */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.sched-btn{padding:9px 2px;text-align:center;border-radius:7px;cursor:pointer;border:1px solid var(--b1);background:var(--s2);transition:all .15s}
.sched-btn.locked{opacity:.3;cursor:default}
.sched-btn-name{font-family:var(--font-d);font-size:11px;font-weight:700;color:var(--tm)}
.sched-btn-type{font-size:9px;color:var(--tf);margin-top:2px;font-family:var(--font-d);font-weight:600;text-transform:uppercase}

/* BASELINE GRID */
.baseline-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bl-item{}
.bl-label{font-size:11px;color:var(--tm);font-family:var(--font-d);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.bl-input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--font-b);font-size:14px}
.bl-input:focus{outline:none;border-color:var(--green)}
.bl-hint{font-size:10px;color:var(--tf);margin-top:2px}

/* PROG TABLE */
.prog-table{width:100%;border-collapse:collapse;font-size:12px}
.prog-table th{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tf);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1)}
.prog-table td{padding:8px;border-bottom:1px solid var(--b1);vertical-align:top;color:var(--tm)}
.prog-table tr:last-child td{border-bottom:none}
.prog-table td:first-child{color:var(--tx);font-weight:500}
.wt-cell{color:var(--green) !important;font-family:var(--font-d);font-weight:700;font-size:13px}
.spd-cell{color:var(--blue) !important;font-family:var(--font-d);font-weight:700;font-size:13px}
.plan-demo{color:var(--blue);text-decoration:none;font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.04em}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;font-family:var(--font-d);font-size:13px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:10px 22px;border-radius:8px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:998;animation:fall 1.2s ease-in forwards}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.empty{font-size:13px;color:var(--tf);padding:8px 0}
.divider{height:1px;background:var(--b1);margin:12px 0}
.mt{margin-top:12px}

function today(){return new Date().toISOString().slice(0,10);}
function todayDow(){return (new Date().getDay()+6)%7;}
function weekNumber(){const d=Math.max(0,(new Date()-new Date(S.settings.startDate+'T12:00:00'))/86400000);return Math.min(12,Math.max(1,Math.ceil(d/7)));}
function weekPairIdx(){return Math.min(5,Math.floor((weekNumber()-1)/2));}
function getDayType(dow){return S.schedule[dow]||'reload';}

// Lift sequence for alternating A→B→C
function getLiftTypeForDow(dow){
  // Count how many lift days have passed since start to determine rotation
  const startDow = (new Date(S.settings.startDate+'T12:00:00').getDay()+6)%7;
  const daysSince = Math.max(0,Math.round((new Date()-new Date(S.settings.startDate+'T12:00:00'))/86400000));
  let liftCount = 0;
  for(let i=0;i<daysSince;i++){
    const d=(startDow+i)%7;
    if(S.schedule[d]==='lift') liftCount++;
  }
  // Today's position
  const todayIsLift = S.schedule[dow]==='lift';
  if(!todayIsLift) return S.schedule[dow];
  const types=['a','b','c'];
  return types[liftCount%3];
}

// Resolve actual day type (lift days rotate a/b/c)
function resolveType(dow){
  const raw = S.schedule[dow];
  if(raw==='lift') return getLiftTypeForDow(dow);
  return raw;
}

// ─── WEIGHT / SPEED HELPERS ──────────────────────────────────────────────────
function bl(){return S.baseline || DEFAULT_BL;}
function getW(group,key){
  const wpi=weekPairIdx(), deload=S.settings.deload;
  const base=(bl()[group]&&bl()[group][key]!=null)?bl()[group][key]:DEFAULT_BL[group][key];
  const prog=PROG[group]?PROG[group][key]||0:0;
  const val=base+prog*wpi;
  return deload?Math.round(val*0.6*2)/2:val;
}
function fmt(kg){return Number.isInteger(kg)?kg+'kg':kg.toFixed(1)+'kg';}
function fmtSpd(s){return Number.isInteger(s)?s+' km/h':s.toFixed(1)+' km/h';}

// Get effective exercise name (accounting for swaps)
function exName(sessionKey, defaultName){
  return S.swaps[sessionKey] || defaultName;
}

// Check PB
function checkPB(exKey, weightStr){
  const prev = S.pbs[exKey];
  if(!prev || weightStr > prev.w){
    S.pbs[exKey]={w:weightStr,date:today()};
    return true;
  }
  return false;
}

// ─── NUDGE ENGINE ─────────────────────────────────────────────────────────────
function getNudge(streak, type){
  if(type==='reload'||type==='sanctuary') return null;
  const hour = new Date().getHours();
  if(streak>=3) return {title:`${streak}-session streak`,sub:"Don't let today break the chain. Get to the gym.",style:'streak'};
  if(hour>=7&&hour<10) return {title:'Go now',sub:`Morning window is open. Session takes ${SESSION_TIMES[type]?.total||79} min. Move.`,style:'urgent'};
  if(hour>=17&&hour<20) return {title:'Evening window',sub:'This is your second chance today. Go now.',style:'normal'};
  if(hour>=20) return {title:'Last chance',sub:"Gym closes soon. A session now beats breaking the routine.",style:'urgent'};
  return {title:'Train today',sub:'Get to the gym and log your session.',style:'normal'};
}

function selectDay(dow){
  _viewingDow = (dow===todayDow()) ? null : dow;
  renderToday();
}

function renderToday(){
  const el = document.getElementById('view-today');
  const realDow = todayDow();
  const viewDow = _viewingDow !== null ? _viewingDow : realDow;
  const isToday = viewDow === realDow;

  const type = resolveType(viewDow);
  const typeInfo = DAY_TYPES[type] || DAY_TYPES.reload;
  const wn = weekNumber();
  const deload = S.settings.deload;
  const alreadyDone = S.sessions.find(s=>s.date===today());
  const streak = calcStreak();

  const now = new Date();
  const dayNum = now.getDate();
  const monthStr = now.toLocaleDateString('en-GB',{month:'long'});
  const yearStr = now.getFullYear();
  const weekdayStr = now.toLocaleDateString('en-GB',{weekday:'long'});

  let html = `<div class="logo-header">
    <div class="logo-left">
      <div class="logo-name-row">${LOGO_SVG}<span class="logo-name">Mi Amor <span>Shredded</span></span></div>
      <div class="logo-weekday">${weekdayStr}</div>
      <div class="logo-date-big">${dayNum} <span>${monthStr}</span></div>
      <div class="logo-year">${yearStr}</div>
    </div>
    <div class="logo-right">
      <span class="badge ${typeInfo.badge}">${typeInfo.name}</span>
      <span style="font-family:var(--font-d);font-size:11px;color:var(--tf);letter-spacing:.04em">WEEK ${wn} OF 12${deload?' · DELOAD':''}</span>
    </div>
  </div>`;

  html += renderWeekStrip(realDow, viewDow);

  if(!isToday){
    const vName = DAYS_FULL[viewDow];
    html += `<div class="viewing-banner"><span>Viewing <b>${vName}</b> — ${typeInfo.name} — read only</span><button class="back-btn" onclick="selectDay(${realDow})">Back to today</button></div>`;
  }

  // Session done today
  if(alreadyDone && isToday){
    const nextInfo = getNextWorkoutDay(realDow);
    const missed = getMissedDay();
    html += `<div class="day-notice"><div class="notice-title" style="color:var(--green)">Session Logged</div><div class="notice-sub">Logged at ${alreadyDone.pct}% completion. Results happen in recovery.</div></div>`;
    if(nextInfo) html += `<div class="card card-pad"><div class="card-title">Next session</div><div style="font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--tx)">${DAYS_FULL[nextInfo.dow]} — ${DAY_TYPES[nextInfo.type]?.name||nextInfo.type}</div><div style="font-size:13px;color:var(--tm);margin-top:4px">${nextInfo.type==='cardio'?'25 min boxing + 35 min incline walk':'Full workout session'}</div></div>`;
    if(missed){
      html += `<div class="card card-pad" style="border-color:var(--amber)">
        <div class="card-title" style="color:var(--amber)">Missed session</div>
        <div style="font-size:13px;color:var(--tm);margin-bottom:12px;line-height:1.5"><b style="color:var(--tx)">${missed.label}</b> — ${DAY_TYPES[missed.type]?.name||missed.type} — was not logged. Did you do it?</div>
        <div style="display:flex;gap:8px">
          <button onclick="logMissedSession('${missed.date}','${missed.type}')" style="flex:1;padding:12px;background:var(--amber);color:#000;font-family:var(--font-d);font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer">Yes — log it</button>
          <button onclick="dismissMissed(this)" style="flex:1;padding:12px;background:none;border:1px solid var(--b1);border-radius:8px;color:var(--tm);font-family:var(--font-d);font-size:14px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer">No — skip</button>
        </div>
      </div>`;
    }
    el.innerHTML = html; return;
  }

  // Nudge (today, not done, lift/cardio day)
  if(isToday && !alreadyDone && type!=='reload' && type!=='sanctuary'){
    const nudge = getNudge(streak, type);
    if(nudge) html += `<div class="nudge ${nudge.style}"><div class="nudge-title">${nudge.title}</div><div class="nudge-sub">${nudge.sub}</div></div>`;
  }

  // Sanctuary
  if(type==='sanctuary'){
    html += `<div class="day-notice"><div class="notice-title">Sanctuary</div><div class="notice-sub">Sunday is non-negotiable rest. Eat your protein, sleep 8+ hours, and come back tomorrow ready.</div></div>`;
    el.innerHTML = html; return;
  }

  // Reload
  if(type==='reload'){
    const reloadActivities = ['Swimming or Basketball — 30 min','Yoga or Pilates — 30 min','Light walk — 30 min','Full rest — no activity needed'];
    html += `<div class="day-notice"><div class="notice-title" style="color:var(--amber)">Reload</div><div class="notice-sub">Basketball, Swimming, Yoga or Pilates. Choose what your body needs today but do one 💪</div></div>`;
    if(isToday && !alreadyDone) html += `<button class="complete-btn" onclick="logSession('reload',100)" style="background:var(--amber);color:#000">Log recovery</button>`;
    el.innerHTML = html; return;
  }

  // Build workout
  const workout = getWorkout(type);
  if(!workout){ el.innerHTML = html+'<div class="day-notice"><div class="notice-title">Rest</div></div>'; return; }

  const times = SESSION_TIMES[type] || SESSION_TIMES.a;
  const allExKeys = getAllExKeys(workout);
  const totalEx = allExKeys.length;
  const doneEx = isToday ? allExKeys.filter(k=>S.ticks[k]).length : 0;
  const pct = totalEx>0 ? Math.round(doneEx/totalEx*100) : 0;
  const circ = 2*Math.PI*36;

  // Time banner
  const bdItems = Object.entries(times).filter(([k])=>k!=='total').map(([k,v])=>`<div class="tb-item"><span>${k.charAt(0).toUpperCase()+k.slice(1)}:</span> ${v} min</div>`).join('');
  html += `<div class="time-banner"><div><div class="time-lbl">Total session time</div><div class="time-val">${times.total} min</div></div><div class="time-breakdown">${bdItems}</div></div>`;

  // Progress ring (today only)
  if(isToday){
    const off = circ-(pct/100)*circ;
    html += `<div class="card"><div class="ring-wrap">
      <svg width="86" height="86" viewBox="0 0 86 86" style="flex-shrink:0">
        <circle cx="43" cy="43" r="36" fill="none" stroke="var(--s3)" stroke-width="6"/>
        <circle cx="43" cy="43" r="36" fill="none" stroke="var(--green)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 43 43)" id="ring-arc"/>
      </svg>
      <div class="ring-info">
        <div class="ring-pct" id="ring-pct">${pct}%</div>
        <div class="ring-label">session progress</div>
        <div class="ring-done" id="ring-done">${doneEx} / ${totalEx} exercises</div>
      </div>
    </div></div>`;
  }

  // Phases
  workout.phases.forEach((phase,pi)=>{
    html += `<div class="card">
      <div class="phase-head" onclick="togglePhase('pb${pi}','pch${pi}')">
        <span class="phase-pill ${phase.pill}">${phase.label}</span>
        <span class="phase-dur">${phase.dur}</span>
        <svg class="phase-chevron${pi===0?' open':''}" id="pch${pi}" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="phase-body${pi===0?' open':''}" id="pb${pi}">
        <div class="phase-instructions">${phase.instructions}</div>`;

    phase.zones.forEach(zone=>{
      html += `<div class="zone-header"><span class="zone-icon">${zone.icon}</span><span class="zone-name">${zone.name}</span></div>`;

      if(phase.id==='cir'||phase.id==='gri'&&false){
        // Circuit: wrap in round container
        const roundExes = zone.exercises.filter(e=>e.round);
        const nonRound = zone.exercises.filter(e=>!e.round);
        nonRound.forEach(ex=>{ html += renderExRow(ex, isToday, totalEx, circ, false); });
        if(roundExes.length){
          html += `<div class="round-wrap">
            <div class="round-header">4 Rounds <span class="round-rest">· 60 sec rest between rounds · no rest within round</span></div>`;
          // Group supersets within round
          html += renderExGroup(roundExes, isToday, totalEx, circ, true);
          html += `</div>`;
        }
      } else {
        html += renderExGroup(zone.exercises, isToday, totalEx, circ, false);
      }
    });

    html += `</div></div>`;
  });

  // Session notes
  if(isToday){
    const savedNote = S.notes[today()]||'';
    html += `<div class="card"><div class="notes-wrap">
      <div class="notes-label">Session notes</div>
      <textarea class="notes-input" id="session-notes" placeholder="How did it feel? Any PRs, tight spots, or wins to record...">${savedNote}</textarea>
      <button class="notes-save" onclick="saveNote()">Save note</button>
    </div></div>`;
  }

  if(isToday) html += `<button class="complete-btn" onclick="finishSession(${totalEx})">Mark session complete</button>`;
  html += `<div style="height:16px"></div>`;
  el.innerHTML = html;
}

function renderExGroup(exercises, isToday, totalEx, circ, inRound){
  let html = '';
  let i = 0;
  while(i < exercises.length){
    const ex = exercises[i];
    if(ex.superset==='start'){
      // Find all exercises in this superset
      const group = [ex];
      let j = i+1;
      while(j<exercises.length && exercises[j].superset && exercises[j].superset!=='start'){
        group.push(exercises[j]); j++;
      }
      html += `<div class="superset-wrap"><div class="superset-label">Superset — no rest between these</div>`;
      group.forEach(e=>{ html += renderExRow(e, isToday, totalEx, circ, inRound); });
      html += `</div>`;
      i = j;
    } else {
      html += renderExRow(ex, isToday, totalEx, circ, inRound);
      i++;
    }
  }
  return html;
}

function renderExRow(ex, isToday, totalEx, circ, inRound){
  const key = ex.key;
  const done = isToday && !!S.ticks[key];
  const displayName = exName(key, ex.name);
  const isPB = S.pbs[key] && S.pbs[key].date === today();
  const clickAttr = isToday ? `onclick="tickEx('${key}',${totalEx},${circ.toFixed(1)})"` : '';
  const swapOpts = SWAPS[ex.name];
  const extraClass = inRound ? ' in-round' : '';

  return `<div class="ex-row${done?' done':''}${extraClass}" id="exrow_${key}" ${clickAttr} style="${!isToday?'cursor:default':''}">
    <div class="check${done?' ticked':''}" id="chk_${key}">${done?`<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
    </div>
    <div class="ex-info">
      <div class="ex-name">${displayName}${isPB?'<span class="pb-badge" style="margin-left:6px">New PB</span>':''}</div>
      <div class="ex-meta">
        ${ex.sets?`<span class="mp mp-sets">${ex.sets}</span>`:''}
        ${ex.weight?`<span class="mp mp-weight">${ex.weight}</span>`:''}
        ${ex.speed?`<span class="mp mp-speed">${ex.speed}</span>`:''}
        ${ex.rest?`<span class="mp mp-rest">Rest: ${ex.rest}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:0;flex-wrap:wrap">
        ${ex.demo?`<a href="${ex.demo}" target="_blank" class="demo-btn"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Watch demo</a>`:''}
        ${isToday&&swapOpts?`<button class="swap-btn" onclick="event.stopPropagation();openSwap('${key}','${ex.name}')">Swap</button>`:''}
      </div>
    </div>
  </div>`;
}

function getAllExKeys(workout){
  const keys=[];
  workout.phases.forEach(p=>p.zones.forEach(z=>z.exercises.forEach(e=>keys.push(e.key))));
  return keys;
}

function togglePhase(bodyId, chevId){
  const b=document.getElementById(bodyId), c=document.getElementById(chevId);
  if(b) b.classList.toggle('open');
  if(c) c.classList.toggle('open');
}

function tickEx(key, totalEx, circ){
  S.ticks[key]=!S.ticks[key]; saveS();
  const row=document.getElementById('exrow_'+key);
  const chk=document.getElementById('chk_'+key);
  if(row) row.classList.toggle('done',!!S.ticks[key]);
  if(chk){
    chk.classList.toggle('ticked',!!S.ticks[key]);
    chk.innerHTML=S.ticks[key]?`<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:'';
  }
  const type = resolveType(todayDow());
  const workout = getWorkout(type);
  if(!workout) return;
  const allKeys = getAllExKeys(workout);
  const done = allKeys.filter(k=>S.ticks[k]).length;
  const pct = Math.round(done/allKeys.length*100);
  const off = circ-(pct/100)*circ;
  const arc=document.getElementById('ring-arc'); if(arc) arc.setAttribute('stroke-dashoffset',off.toFixed(1));
  const rp=document.getElementById('ring-pct'); if(rp) rp.textContent=pct+'%';
  const rd=document.getElementById('ring-done'); if(rd) rd.textContent=done+' / '+allKeys.length+' exercises';
}

function saveNote(){
  const el=document.getElementById('session-notes');
  if(el){ S.notes[today()]=el.value; saveS(); showToast('Note saved'); }
}

function finishSession(totalEx){
  const t=today();
  if(S.sessions.find(s=>s.date===t)) return;
  const type=resolveType(todayDow());
  const workout=getWorkout(type);
  if(workout){
    const allKeys=getAllExKeys(workout);
    const done=allKeys.filter(k=>S.ticks[k]).length;
    const pct=Math.round(done/allKeys.length*100);
    // Check for PBs on weighted exercises
    if(workout) workout.phases.forEach(ph=>ph.zones.forEach(z=>z.exercises.forEach(ex=>{
      if(ex.weight && ex.weight!=='Bodyweight' && S.ticks[ex.key]){
        checkPB(ex.key, ex.weight);
      }
    })));
    S.sessions.push({date:t,pct,type});
  } else {
    S.sessions.push({date:t,pct:100,type});
  }
  S.ticks={}; saveS(); cancelTodayNotifs(); confetti(); showToast('Session complete!');
  setTimeout(()=>renderToday(),600);
}

function logMissedSession(date, type){
  if(!S.sessions.find(s=>s.date===date)){
    S.sessions.push({date, pct:100, type}); saveS();
    showToast('Missed session logged');
    renderToday();
  }
}

function logSession(type, pct){

  if(!S.sessions.find(s=>s.date===t)){
    S.sessions.push({date:t,pct,type}); saveS(); showToast('Logged'); renderToday();
  }

function getNextWorkoutDay(dow){
  for(let i=1;i<=7;i++){
    const d=(dow+i)%7;
    const t=resolveType(d);
    if(t!=='reload'&&t!=='sanctuary') return {dow:d,type:t};
  }
  return null;
}

// Returns yesterday's workout day if unlogged, otherwise null
function getMissedDay(){
  const d = new Date(); d.setDate(d.getDate()-1);
  const ds = d.toISOString().slice(0,10);
  const dow = (d.getDay()+6)%7;
  const type = resolveType(dow);
  if(type==='reload'||type==='sanctuary') return null;
  if(S.sessions.find(s=>s.date===ds)) return null;
  return {date:ds, dow, type, label:DAYS_FULL[dow]};
}

function renderWeekStrip(realDow, viewDow){
  let html='<div class="week-strip">';
  DAYS_SHORT.forEach((d,i)=>{

    const info=DAY_TYPES[type]||DAY_TYPES.reload;
    const isToday=i===realDow, isViewing=i===viewDow;

      <div class="ws-name">${d}</div>
      <div class="ws-type">${info.name.split(' ')[0]}</div>
    </div>`;
  });

}

function openSwap(key, defaultName){

function logWeight(){

  destroyChart('wt'); buildWeightChart(); showToast('Weight logged');

function buildWeightChart(){
  destroyChart('wt');
  const ctx=document.getElementById('wt-chart'); if(!ctx) return;
  const w=S.weights; const sw=S.settings.startWeight; const tw=S.settings.targetWeight;
  if(!w.length){
    const c=ctx.getContext('2d'); c.fillStyle='#555'; c.font='13px Barlow,sans-serif';
    c.fillText('Log your first weight to see the chart',10,90); return;
  }
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const labels=w.map(x=>{ const d=new Date(x.date+'T12:00:00'); return d.getDate()+'-'+MONTHS[d.getMonth()]; });
  // Trend line
  const n=w.length; const xs=w.map((_,i)=>i); const ys=w.map(x=>x.kg);
  const sumX=xs.reduce((a,b)=>a+b,0), sumY=ys.reduce((a,b)=>a+b,0);
  const sumXY=xs.reduce((a,x,i)=>a+x*ys[i],0), sumX2=xs.reduce((a,x)=>a+x*x,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX||1);
  const intercept=(sumY-slope*sumX)/n;
  const trend=xs.map(x=>Math.round((slope*x+intercept)*10)/10);

  _charts['wt']=new Chart(ctx,{type:'line',data:{labels,datasets:[
    {label:'Weight',data:ys,borderColor:'#39d98a',backgroundColor:'rgba(57,217,138,0.06)',borderWidth:2.5,pointBackgroundColor:'#39d98a',pointRadius:4,tension:0.3},
    {label:'Trend',data:trend,borderColor:'rgba(57,217,138,0.35)',borderWidth:1.5,borderDash:[4,4],pointRadius:0},
    {label:'Target',data:labels.map(()=>tw),borderColor:'#ff5c5c',borderWidth:1,borderDash:[3,3],pointRadius:0},
    {label:'Start',data:labels.map(()=>sw),borderColor:'#555',borderWidth:1,borderDash:[2,4],pointRadius:0},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
    x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1e1e1e'},border:{color:'#2a2a2a'}},
    y:{ticks:{color:'#555',font:{size:10},callback:v=>v+'kg'},grid:{color:'#1e1e1e'},border:{color:'#2a2a2a'},min:Math.floor(tw-2),max:Math.ceil(sw+1)}
  }}});
}

function buildHeatmap(){
  const grid=document.getElementById('hm-grid'); if(!grid) return;
  const start=new Date(S.settings.startDate+'T12:00:00');
  const t=today(); const dd={};

  let html='';
  for(let i=0;i<84;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);

    const cls=tp==='a'?'done-a':tp==='b'?'done-b':tp==='c'?'done-c':tp==='cardio'?'done-cardio':tp?'done-rec':'';
    html+=`<div class="hm-cell${cls?' '+cls:''}${ds===t?' today-c':''}${ds>t?' future':''}"></div>`;
  }
  grid.innerHTML=html;
}

function buildProgTableRows(){
  const blData=bl();

    {label:'DB Thruster',g:'b',k:'thruster'},{label:'Goblet Squat',g:'b',k:'goblet'},
    {label:'Leg Curl',g:'b',k:'legcurl'},{label:'Lat Pulldown',g:'b',k:'pulldown'},
    {label:'Trap bar deadlift',g:'c',k:'trapDL'},{label:'Bulgarian split squat',g:'c',k:'splitSqt'},
  ];
  return rows.map(r=>{
    const base=(blData[r.g]&&blData[r.g][r.k]!=null)?blData[r.g][r.k]:DEFAULT_BL[r.g][r.k];
    const prog=PROG[r.g]?PROG[r.g][r.k]||0:0;
    const cells=Array.from({length:6},(_,i)=>fmt(base+prog*i)).map(v=>`<td class="wt-cell">${v}</td>`).join('');
    return `<tr><td>${r.label}</td>${cells}</tr>`;
  }).join('');
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
let _notifTimers=[], _notifLastDate=null;

function requestNotifPermission(){
  if(!('Notification' in window)){showToast('Not supported');return;}
  Notification.requestPermission().then(p=>{
    S.settings.notifGranted=p==='granted'; saveS();
    if(p==='granted'){showToast('Notifications on!');initNotifs();renderSettings();}
    else showToast('Permission denied');
  });
}

function initNotifs(){
  _notifTimers.forEach(t=>clearTimeout(t)); _notifTimers=[];
  if(!S.settings.notifGranted||Notification.permission!=='granted') return;
  const t=today(); if(_notifLastDate===t) return; _notifLastDate=t;
  const dow=todayDow(); const ns=S.settings;
  if(!(ns.notifDays||[0,2,4,5]).includes(dow)){scheduleMidnightReset();return;}
  const [startH]=(ns.notifStart||'07:00').split(':').map(Number);
  const [endH]=(ns.notifEnd||'21:00').split(':').map(Number);
  const mode=ns.notifMode||'hourly'; const interval=Math.max(1,parseInt(ns.notifInterval)||2);
  const hours=[]; for(let h=startH;h<=endH;h+=(mode==='hourly'?1:interval)) hours.push(h);
  const now=new Date(); const streak=calcStreak();
  hours.forEach((h,idx)=>{
    const fireAt=new Date(); fireAt.setHours(h,0,0,0);
    const delay=fireAt-now; if(delay<0) return;
    const msg=NOTIF_MSGS[idx%NOTIF_MSGS.length];
    const body=streak>=3?`${streak}-session streak. ${msg.body}`:msg.body;
    _notifTimers.push(setTimeout(()=>{
      if(S.sessions.find(s=>s.date===today())) return;
      new Notification(msg.title,{body,tag:`mas-${h}`,requireInteraction:false});
    },delay));
  });
  scheduleMidnightReset();
}

function scheduleMidnightReset(){
  const midnight=new Date(); midnight.setHours(24,0,0,0);
  _notifTimers.push(setTimeout(()=>{_notifLastDate=null;_notifTimers.forEach(x=>clearTimeout(x));_notifTimers=[];initNotifs();},midnight-new Date()));
}

function cancelTodayNotifs(){_notifTimers.forEach(t=>clearTimeout(t));_notifTimers=[];}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function calcStreak(){
  const sorted=[...S.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length) return 0;
  let streak=1, prev=sorted[0].date;
  for(let i=1;i<sorted.length;i++){
    const diff=(new Date(prev)-new Date(sorted[i].date))/86400000;
    if(diff<=3){streak++;prev=sorted[i].date;}else break;
  }
  return streak;
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function confetti(){
  const cols=['#39d98a','#4da6ff','#a78bfa','#f5a623','#ff5c5c'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%5]};animation-delay:${Math.random()*.5}s;animation-duration:${.8+Math.random()*.8}s`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),1600);
  }
}

// Init
renderToday();
if(S.settings.notifGranted && Notification.permission==='granted') initNotifs();
</script>
</body>
